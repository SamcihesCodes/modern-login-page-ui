<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="kilit.png">
</head>

<body>

    <div class="form-card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Giriş</button>
            <button class="tab-btn" onclick="switchTab('register')">Kayıt ol</button>



        </div>

        <form id="login-form" class="form-content active">
            <div class="input-group">
                <input type="text" placeholder="Kullanıcı adı" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Parola" required>
            </div>

            <label class="remember-me">
                <input type="checkbox" id="remember">
                <span class="custom-checkbox"></span>
                Beni hatırla.
            </label>

            <button type="submit" class="submit-btn">Giriş</button>
        </form>


        <form id="register-form" class="form-content">
            <div class="input-group">
                <input type="email" placeholder="E-Mail" required>
            </div>

            <div class="input-group">
                <input type="text" placeholder="Kullanıcı adı" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Parola" required> 
            </div>

            <button type="submit" class="submit-btn">Kayıt ol</button>
        </form>



            <script>
                function switchTab(tabName){
                    const loginForm = document.getElementById('login-form');
                    const registerForm = document.getElementById('register-form');
                    const buttons = document.querySelectorAll('.tab-btn');

                    buttons.forEach(btn => btn.classList.remove('active'));


                    if(tabName === 'login'){
                        buttons[0].classList.add('active');
                        registerForm.classList.remove('active');
                        loginForm.classList.add('active');

                    } else{
                         buttons[1].classList.add('active');
                         registerForm.classList.add('active');
                         loginForm.classList.remove('active');
                    }

                }






            </script>







    </div>








</body>

</html>
